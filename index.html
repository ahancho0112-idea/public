<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我们的数字小窝</title>
    <!-- 引入 PWA 配置文件 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f43f5e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://api.iconify.design/ph/heart-fill.svg?color=%23f43f5e&width=180&height=180">

    <!-- 引入 Tailwind CSS 进行页面美化 -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 配置浏览器 ES Module 引入规则 -->
<script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "lucide-react": "https://esm.sh/lucide-react@0.263.0",
      "firebase/app": "https://esm.sh/firebase@10.5.0/app",
      "firebase/auth": "https://esm.sh/firebase@10.5.0/auth",
      "firebase/firestore": "https://esm.sh/firebase@10.5.0/firestore"
    }
  }
</script>
    
    <!-- 引入 Babel 编译器以在浏览器中运行 React JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 隐藏滚动条但保留滚动功能 */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        body { margin: 0; background-color: #f3f4f6; }
    </style>
</head>
<body class="antialiased selection:bg-rose-200">
    <div id="root"></div>

    <!-- 核心 React 代码开始 -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          MessageSquare, Map, BookOpen, Heart, Plus, CheckCircle, Circle,
          Image as ImageIcon, Video, Type, X, ChevronRight, ChevronLeft,
          Send, User, Settings, Calendar, Pencil, Check, Lock, Key, Shield, List, ImagePlus
        } from 'lucide-react';
        
        // ========================================================
        // ⚠️ 第 1 步：配置云端数据库 (Firebase)
        // 请将您在 Firebase 控制台获取的实际配置覆盖在下方的括号内
        // ========================================================
        const firebaseConfig = {
  apiKey: "AIzaSyAqhGg_SsPokZK86MZ7O0X_B5EnDJxvhZw",
  authDomain: "sticky-note-300e5.firebaseapp.com",
  projectId: "sticky-note-300e5",
  storageBucket: "sticky-note-300e5.firebasestorage.app",
  messagingSenderId: "390722334999",
  appId: "1:390722334999:web:33e3d8cbf8254bf64f0752",
  measurementId: "G-YQ3FBJ5Z6R"
};

        const isFirebaseConfigured = Object.keys(firebaseConfig).length > 0;
        
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, onSnapshot, doc, setDoc } from 'firebase/firestore';

        let app, auth, db;
        if (isFirebaseConfigured) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }

        const formatYMD = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

        function App() {
            // ============== 如果没有配置数据库，给小白一个友好的提示页面 ==============
            if (!isFirebaseConfigured) {
                return (
                    <div className="min-h-[100dvh] flex flex-col items-center justify-center p-8 bg-gray-900 text-white text-center space-y-6">
                        <Shield size={64} className="text-rose-500 mb-4" />
                        <h1 className="text-2xl font-bold">部署成功！只差最后一步</h1>
                        <p className="text-gray-300 leading-relaxed text-sm">
                            您的情侣小窝网页已经跑起来了。<br/>为了保证信息的**私密与云端同步**，您需要接入一个数据库。
                        </p>
                        <div className="bg-gray-800 p-4 rounded-xl text-left text-xs text-green-400 font-mono w-full break-all">
                            1. 去 firebase.google.com 免费创建一个项目。<br/>
                            2. 拿到您的 firebaseConfig 代码。<br/>
                            3. 在 GitHub 找到 index.html 的第 47 行，把代码贴进去。<br/>
                            4. 保存，Vercel 会自动更新，您的 App 就彻底活了！
                        </div>
                    </div>
                );
            }

            // ============== 门禁鉴权与持久化状态 ==============
            const [user, setUser] = useState(null);
            const [isLoggedIn, setIsLoggedIn] = useState(() => localStorage.getItem('couple_app_logged_in') === 'true');
            const [roomCode, setRoomCode] = useState(() => localStorage.getItem('couple_app_room_code') || '');
            const [activeTab, setActiveTab] = useState('home');
            
            useEffect(() => {
                const initAuth = async () => {
                    try { await signInAnonymously(auth); } 
                    catch(e) { console.error('鉴权初始化失败:', e); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // ============== 个人档案 ==============
            const [showProfileModal, setShowProfileModal] = useState(false);
            const [userProfile, setUserProfile] = useState(() => {
                const saved = localStorage.getItem('couple_app_profile');
                return saved ? JSON.parse(saved) : { nickname: '我', gender: 'female', birthday: '1996-01-01' };
            });
            const [editProfile, setEditProfile] = useState({...userProfile});

            const themeColors = {
                female: { text: 'text-rose-500', bg: 'bg-rose-500', bgSoft: 'bg-rose-50', gradient: 'from-rose-400 to-pink-500', borderHeart: 'border-rose-400', tagBg: 'bg-rose-100 text-rose-600' },
                male: { text: 'text-blue-500', bg: 'bg-blue-500', bgSoft: 'bg-blue-50', gradient: 'from-blue-400 to-cyan-500', borderHeart: 'border-blue-400', tagBg: 'bg-blue-100 text-blue-600' }
            };
            const c = themeColors[userProfile.gender] || themeColors.female;

            // ============== 云端数据同步 ==============
            const [todayStr] = useState(formatYMD(new Date()));
            const [currentMonthView, setCurrentMonthView] = useState(new Date(new Date().getFullYear(), new Date().getMonth(), 1));
            const [selectedDate, setSelectedDate] = useState(todayStr);

            const [messages, setMessages] = useState([]);
            const [plans, setPlans] = useState([]);
            const [anniversaries, setAnniversaries] = useState([]);

            const getCol = (name) => collection(db, 'artifacts', 'private-couple-app', 'public', 'data', `${name}_${roomCode}`);
            
            useEffect(() => {
                if (!user || !isLoggedIn || !roomCode) return;
                const unsubMsgs = onSnapshot(getCol('messages'), (snap) => {
                    setMessages(snap.docs.map(d => ({ _docId: d.id, ...d.data() })).sort((a,b) => b.id - a.id));
                });
                const unsubPlans = onSnapshot(getCol('plans'), (snap) => {
                    setPlans(snap.docs.map(d => ({ _docId: d.id, ...d.data() })).sort((a,b) => b.id - a.id));
                });
                const unsubAnniv = onSnapshot(getCol('anniversaries'), (snap) => {
                    setAnniversaries(snap.docs.map(d => ({ _docId: d.id, ...d.data() })));
                });
                return () => { unsubMsgs(); unsubPlans(); unsubAnniv(); };
            }, [user, isLoggedIn, roomCode]);

            // ============== 状态处理 ==============
            const [showCalendarModal, setShowCalendarModal] = useState(false);
            const [showAddMenu, setShowAddMenu] = useState(false);
            const [showAddNoteModal, setShowAddNoteModal] = useState(null); 
            const [newNoteText, setNewNoteText] = useState("");
            const [mediaPreview, setMediaPreview] = useState(null);
            const [selectedNote, setSelectedNote] = useState(null);
            const [replyText, setReplyText] = useState("");
            const [isEditingNote, setIsEditingNote] = useState(false);
            const [editNoteText, setEditNoteText] = useState("");

            const [planType, setPlanType] = useState('small');
            const [selectedPlan, setSelectedPlan] = useState(null);
            const [showAddPlanModal, setShowAddPlanModal] = useState(false);
            const [newPlan, setNewPlan] = useState({ text: '', type: 'small', creatorRole: userProfile.gender, deadline: '', details: '' });
            const [isEditingPlan, setIsEditingPlan] = useState(false);
            const [editPlanData, setEditPlanData] = useState(null);

            const [showAddAnniversary, setShowAddAnniversary] = useState(false);
            const [newAnni, setNewAnni] = useState({ title: '', date: '' });

            // 监听数据刷新弹窗
            useEffect(() => { if (selectedNote) { const updated = messages.find(m => m.id === selectedNote.id); if (updated) setSelectedNote(updated); } }, [messages]);
            useEffect(() => { if (selectedPlan) { const updated = plans.find(p => p.id === selectedPlan.id); if (updated) setSelectedPlan(updated); } }, [plans]);

            const isMe = (role) => role === userProfile.gender;

            // ============== 方法 ==============
            const handleLogin = () => {
                setUserProfile(editProfile);
                setIsLoggedIn(true);
                localStorage.setItem('couple_app_logged_in', 'true');
                localStorage.setItem('couple_app_room_code', roomCode);
                localStorage.setItem('couple_app_profile', JSON.stringify(editProfile));
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                localStorage.removeItem('couple_app_logged_in');
                setShowProfileModal(false);
            };

            const handleSaveProfile = () => {
                setUserProfile(editProfile);
                setShowProfileModal(false);
                localStorage.setItem('couple_app_profile', JSON.stringify(editProfile));
            };

            const handleSaveNewNote = async () => {
                if (!newNoteText.trim() && showAddNoteModal === 'text' && !mediaPreview) return;
                const now = new Date();
                const bgColors = ['bg-yellow-100', 'bg-orange-50', 'bg-emerald-50', 'bg-blue-50', 'bg-rose-50'];
                
                const newMsg = {
                    id: Date.now(),
                    type: showAddNoteModal,
                    text: newNoteText || (showAddNoteModal === 'photo' ? '分享了一张照片 📷' : '分享了一段视频 🎥'),
                    mediaUrl: mediaPreview || null,
                    date: todayStr,
                    time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    bg: bgColors[Math.floor(Math.random() * bgColors.length)],
                    rotation: ['rotate-1', 'rotate-2', '-rotate-1', '-rotate-2'][Math.floor(Math.random() * 4)],
                    creatorRole: userProfile.gender,
                    replies: []
                };
                await setDoc(doc(getCol('messages'), newMsg.id.toString()), newMsg);
                setShowAddNoteModal(null); setNewNoteText(""); setMediaPreview(null);
            };

            const handleReplyNote = async () => {
                if (!replyText.trim() || !selectedNote) return;
                const now = new Date();
                const newReply = { creatorRole: userProfile.gender, text: replyText, time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
                await setDoc(doc(getCol('messages'), selectedNote._docId), { replies: [...(selectedNote.replies || []), newReply] }, { merge: true });
                setReplyText("");
            };

            // ============== UI 渲染部分 ==============

            if (!isLoggedIn) {
                return (
                    <div className="min-h-[100dvh] bg-[#FDFCF8] flex items-center justify-center p-4 relative overflow-hidden">
                        <div className="bg-white w-full max-w-[360px] rounded-[32px] shadow-2xl p-8 relative z-10 border border-gray-100">
                            <div className="flex justify-center mb-6"><div className="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center shadow-inner"><Shield size={32} className="text-gray-300" /></div></div>
                            <h1 className="text-2xl font-black text-gray-800 text-center mb-2">小窝门禁</h1>
                            <p className="text-sm text-gray-400 text-center mb-8">云端加密同步，属于两人的私密空间</p>
                            <div className="space-y-6">
                                <div>
                                    <label className="text-xs font-bold text-gray-500 mb-2 flex items-center"><Key size={14} className="mr-1.5"/>专属配对暗号</label>
                                    <input type="text" value={roomCode} onChange={e => setRoomCode(e.target.value)} placeholder="输入约定暗号" className="w-full bg-gray-50 p-4 rounded-2xl text-center font-bold text-lg outline-none" />
                                </div>
                                <div className="bg-gray-50/50 p-4 rounded-2xl border border-gray-100">
                                    <label className="text-xs font-bold text-gray-500 mb-3 flex items-center"><User size={14} className="mr-1.5"/>我的身份</label>
                                    <div className="flex space-x-3 mb-4">
                                        <button onClick={() => setEditProfile({...editProfile, gender: 'female'})} className={`flex-1 py-3 rounded-xl text-sm font-bold border-2 ${editProfile.gender === 'female' ? 'border-rose-400 text-rose-500 bg-rose-50' : 'border-gray-100 text-gray-400 bg-white'}`}>👩 女生</button>
                                        <button onClick={() => setEditProfile({...editProfile, gender: 'male'})} className={`flex-1 py-3 rounded-xl text-sm font-bold border-2 ${editProfile.gender === 'male' ? 'border-blue-400 text-blue-500 bg-blue-50' : 'border-gray-100 text-gray-400 bg-white'}`}>👨 男生</button>
                                    </div>
                                    <input type="text" value={editProfile.nickname} onChange={e => setEditProfile({...editProfile, nickname: e.target.value})} placeholder="我在小窝的昵称" className="w-full p-3 rounded-xl text-sm outline-none border border-gray-100 text-center" />
                                </div>
                                <button disabled={!roomCode.trim() || !editProfile.nickname.trim()} onClick={handleLogin} className="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold flex items-center justify-center disabled:opacity-30"><Lock size={18} className="mr-2" />推门进入</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-[100dvh] sm:bg-gray-200 flex sm:items-center justify-center sm:p-4">
                    <div className="w-full h-[100dvh] sm:h-[800px] sm:max-w-[390px] bg-white sm:rounded-[40px] shadow-2xl relative overflow-hidden">
                        {/* 页面内容区 */}
                        <div className="h-full relative overflow-y-auto pb-24 scrollbar-hide">
                            {/* --- 小纸条 --- */}
                            {activeTab === 'home' && (
                                <div className="p-5">
                                    <div className="flex justify-between items-center mt-2 mb-6">
                                        <div><h1 className="text-2xl font-bold text-gray-800">小纸条</h1><p className="text-sm text-gray-500 mt-1">Hello {userProfile.nickname}</p></div>
                                        <div onClick={() => setShowProfileModal(true)} className={`w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center ${c.text}`}><User size={20} /></div>
                                    </div>
                                    <div onClick={() => setShowCalendarModal(true)} className={`bg-gradient-to-r ${c.gradient} rounded-2xl p-5 text-white mb-6 shadow-lg`}>
                                        <div className="flex items-center space-x-3"><Calendar size={24} /><div className="text-2xl font-black">{todayStr}</div></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 pb-12">
                                        {messages.filter(m => m.date === todayStr).map((msg) => (
                                            <div key={msg.id} onClick={() => setSelectedNote(msg)} className={`${msg.bg} p-4 rounded-xl shadow-sm transform ${msg.rotation} border border-black/5`}>
                                                {msg.type === 'photo' && <div className="w-full h-20 bg-black/5 rounded-lg mb-2 overflow-hidden">{msg.mediaUrl ? <img src={msg.mediaUrl} className="w-full h-full object-cover"/> : <ImageIcon size={20} className="m-auto mt-6 text-gray-400"/>}</div>}
                                                <p className="text-gray-800 text-sm leading-relaxed line-clamp-3">{msg.text}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* --- 备忘录 --- */}
                            {activeTab === 'plan' && (
                                <div className="p-5 bg-stone-50 min-h-full">
                                    <h1 className="text-2xl font-bold text-gray-800 mt-2 mb-6">备忘录</h1>
                                    <div className="flex bg-gray-200/60 rounded-xl p-1 mb-6">
                                        <button onClick={() => setPlanType('small')} className={`flex-1 py-2.5 rounded-lg text-sm font-semibold ${planType === 'small' ? 'bg-white shadow-sm' : 'text-gray-500'}`}>小计划</button>
                                        <button onClick={() => setPlanType('big')} className={`flex-1 py-2.5 rounded-lg text-sm font-semibold ${planType === 'big' ? 'bg-white shadow-sm' : 'text-gray-500'}`}>大目标</button>
                                    </div>
                                    <div className="space-y-3">
                                        {plans.filter(p => p.type === planType && !p.completed).map(plan => (
                                            <div key={plan.id} onClick={() => setSelectedPlan(plan)} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-start gap-3">
                                                <button onClick={(e) => { e.stopPropagation(); setDoc(doc(getCol('plans'), plan._docId), { completed: true, completedAt: todayStr }, { merge: true }); }} className="mt-0.5"><Circle className="w-6 h-6 text-gray-300" /></button>
                                                <div><p className="text-sm font-medium text-gray-800">{plan.text}</p></div>
                                            </div>
                                        ))}
                                        <button onClick={() => setShowAddPlanModal(true)} className="w-full py-4 border-2 border-dashed border-gray-200 text-gray-500 rounded-2xl flex items-center justify-center font-medium text-sm"><Plus size={18} className="mr-2" />添加计划</button>
                                    </div>
                                </div>
                            )}

                            {/* --- 日记本 --- */}
                            {activeTab === 'memory' && (
                                <div className="bg-stone-100 min-h-full">
                                    <div className="bg-white pt-8 pb-4 px-6 shadow-sm rounded-b-3xl"><h1 className="text-xl font-bold text-gray-800">日记本数据盘点</h1></div>
                                    <div className="p-6">
                                        <div className="bg-[#fcfaf5] p-6 rounded-sm shadow-sm border border-stone-200">
                                            <h3 className="text-base font-bold text-center tracking-widest mb-6">{todayStr} 盘点</h3>
                                            <div className="text-sm text-stone-600 space-y-4">
                                                <p>今日收到纸条：<span className="font-bold text-rose-500">{messages.filter(m => m.date === todayStr).length}</span> 张</p>
                                                <p>新增计划目标：<span className="font-bold text-blue-500">{plans.filter(p => p.createdAt === todayStr).length}</span> 个</p>
                                                <p>打卡完成约定：<span className="font-bold text-emerald-500">{plans.filter(p => p.completedAt === todayStr).length}</span> 个</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* 底部导航 */}
                        <div className="absolute bottom-0 w-full bg-white border-t border-gray-100 flex justify-around pb-8 pt-4 z-40">
                            <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center ${activeTab === 'home' ? c.text : 'text-gray-400'}`}><MessageSquare size={24} /><span className="text-[10px] mt-1">小纸条</span></button>
                            <button onClick={() => setActiveTab('plan')} className={`flex flex-col items-center ${activeTab === 'plan' ? c.text : 'text-gray-400'}`}><Map size={24} /><span className="text-[10px] mt-1">备忘录</span></button>
                            <button onClick={() => setActiveTab('memory')} className={`flex flex-col items-center ${activeTab === 'memory' ? c.text : 'text-gray-400'}`}><BookOpen size={24} /><span className="text-[10px] mt-1">日记本</span></button>
                        </div>

                        {/* 小纸条发文悬浮键 */}
                        {activeTab === 'home' && (
                            <>
                                {showAddMenu && <div className="absolute inset-0 z-20" onClick={() => setShowAddMenu(false)}></div>}
                                {showAddMenu && (
                                    <div className="absolute bottom-28 right-6 z-30 bg-white rounded-2xl shadow-xl w-32 overflow-hidden">
                                        <button onClick={() => { setShowAddMenu(false); setShowAddNoteModal('text'); }} className="w-full px-4 py-3 text-sm flex items-center border-b"><Type size={14} className="mr-2"/>文字</button>
                                        <button onClick={() => { setShowAddMenu(false); setShowAddNoteModal('photo'); }} className="w-full px-4 py-3 text-sm flex items-center border-b"><ImageIcon size={14} className="mr-2"/>照片</button>
                                    </div>
                                )}
                                <button onClick={() => setShowAddMenu(!showAddMenu)} className="absolute bottom-24 right-6 w-14 h-14 bg-gray-900 text-white rounded-full flex items-center justify-center shadow-xl z-30"><Plus size={28} /></button>
                            </>
                        )}

                        {/* 全局弹窗区域: 新增纸条 */}
                        {showAddNoteModal && (
                            <div className="absolute inset-0 z-[80] flex items-end bg-black/40 p-4">
                                <div className="bg-white w-full rounded-3xl p-6">
                                    <div className="flex justify-between mb-4"><h3 className="font-bold">新增留言</h3><button onClick={() => setShowAddNoteModal(null)}><X size={18}/></button></div>
                                    {(showAddNoteModal === 'photo') && (
                                        <label className="w-full h-32 bg-gray-50 rounded-xl mb-4 flex justify-center items-center cursor-pointer overflow-hidden border-2 border-dashed">
                                            {mediaPreview ? <img src={mediaPreview} className="w-full h-full object-cover" /> : <span className="text-xs text-gray-400">点击调用相机/相册</span>}
                                            <input type="file" accept="image/*" className="hidden" onChange={(e) => { const f = e.target.files[0]; if(f){ const r = new FileReader(); r.onload=(ev)=>setMediaPreview(ev.target.result); r.readAsDataURL(f); } }} />
                                        </label>
                                    )}
                                    <textarea value={newNoteText} onChange={e => setNewNoteText(e.target.value)} placeholder="写点什么..." className="w-full bg-gray-50 p-4 rounded-xl text-sm h-24 outline-none mb-4"/>
                                    <button onClick={handleSaveNewNote} className={`w-full py-3.5 ${c.bg} text-white rounded-xl font-bold`}>扔到客厅</button>
                                </div>
                            </div>
                        )}

                        {/* 个人设置 */}
                        {showProfileModal && (
                            <div className="absolute inset-0 z-[80] flex items-end bg-black/40 p-4">
                                <div className="bg-white w-full rounded-3xl p-6">
                                    <div className="flex justify-between mb-6"><h3 className="font-bold">账户与偏好</h3><button onClick={() => setShowProfileModal(false)}><X size={18}/></button></div>
                                    <button onClick={handleLogout} className="w-full py-3.5 bg-gray-100 text-gray-500 rounded-xl font-medium text-sm">退出当前小窝</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
