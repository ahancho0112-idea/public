<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>情侣数字小窝</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f43f5e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- 引入 Tailwind CSS 进行页面美化 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Babel 编译器以在浏览器中运行 React JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.0?external=react",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js"
      }
    }
    </script>
    
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        body { margin: 0; background-color: #f3f4f6; }
    </style>
</head>
<body class="antialiased selection:bg-rose-200">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          MessageSquare, Map, BookOpen, Heart, Plus, CheckCircle, Circle,
          Image as ImageIcon, Video, Type, X, ChevronRight, ChevronLeft,
          Send, User, Settings, Calendar, Pencil, Check, Lock, Key, Shield, List, ImagePlus
        } from 'lucide-react';
        
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, onSnapshot, doc, setDoc } from 'firebase/firestore';

        // ========================================================
        // 🚨 钢铁防御机制 1：全局错误捕获，防止白屏
        // ========================================================
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-red-50 flex flex-col items-center justify-center p-6 text-center">
                            <Shield size={48} className="text-red-500 mb-4" />
                            <h2 className="text-xl font-bold text-red-700 mb-2">哎呀，页面崩溃了</h2>
                            <p className="text-sm text-red-500 mb-6">请截图下方错误发给技术支持：</p>
                            <div className="bg-white p-4 rounded-xl shadow border border-red-200 text-left w-full overflow-auto text-xs text-gray-800 font-mono">
                                {this.state.error && this.state.error.toString()}
                            </div>
                            <button onClick={() => window.location.reload()} className="mt-8 px-6 py-3 bg-red-500 text-white rounded-full font-bold shadow-lg">刷新重试</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // ========================================================
        // ⚠️ 请在此处填入您的真实 Firebase 配置！
        // ========================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAqhGg_SsPokZK86MZ7O0X_B5EnDJxvhZw",
            authDomain: "sticky-note-300e5.firebaseapp.com",
            projectId: "sticky-note-300e5",
            storageBucket: "sticky-note-300e5.firebasestorage.app",
            messagingSenderId: "390722334999",
            appId: "1:390722334999:web:33e3d8cbf8254bf64f0752"
        };

        const isFirebaseConfigured = firebaseConfig.apiKey !== "您的API_KEY";
        
        let app, auth, db;
        if (isFirebaseConfigured) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }

        const formatYMD = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

        function App() {
            // 🚨 钢铁防御机制 2：全局消息弹窗系统
            const [toastMsg, setToastMsg] = useState('');
            const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 6000); };

            if (!isFirebaseConfigured) {
                return (
                    <div className="min-h-[100dvh] flex flex-col items-center justify-center p-8 bg-gray-900 text-white text-center space-y-6">
                        <Shield size={64} className="text-rose-500 mb-4" />
                        <h1 className="text-2xl font-bold">代码运行成功！只差最后一步</h1>
                        <p className="text-gray-300 leading-relaxed text-sm">请在 index.html 文件中填入真实的 Firebase 密钥。</p>
                    </div>
                );
            }

            // ============== 门禁鉴权与持久化状态 ==============
            const [user, setUser] = useState(null);
            const [isLoggedIn, setIsLoggedIn] = useState(() => localStorage.getItem('couple_app_logged_in') === 'true');
            const [roomCode, setRoomCode] = useState(() => localStorage.getItem('couple_app_room_code') || '');
            
            useEffect(() => {
                const initAuth = async () => {
                    try { 
                        await signInAnonymously(auth); 
                    } catch(e) { 
                        console.error('鉴权初始化失败:', e); 
                        showToast(`系统警告：身份验证失败！请确保您已在 Firebase 控制台开启了“匿名登录 (Anonymous)”功能！详细错误: ${e.message}`);
                    }
                };
                if(isFirebaseConfigured) initAuth();
                
                let unsubscribe = () => {};
                if(auth) unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // ============== 个人档案与主题 ==============
            const [activeTab, setActiveTab] = useState('home');
            const [showProfileModal, setShowProfileModal] = useState(false);
            const [userProfile, setUserProfile] = useState(() => {
                const saved = localStorage.getItem('couple_app_profile');
                return saved ? JSON.parse(saved) : { nickname: '我', gender: 'female', birthday: '1996-01-01' };
            });
            const [editProfile, setEditProfile] = useState({...userProfile});

            const themeColors = {
                female: { text: 'text-rose-500', bg: 'bg-rose-500', bgHover: 'hover:bg-rose-600', bgLight: 'bg-rose-100', bgSoft: 'bg-rose-50', gradient: 'from-rose-400 to-pink-500', borderHeart: 'border-rose-400', tagBg: 'bg-rose-100 text-rose-600' },
                male: { text: 'text-blue-500', bg: 'bg-blue-500', bgHover: 'hover:bg-blue-600', bgLight: 'bg-blue-100', bgSoft: 'bg-blue-50', gradient: 'from-blue-400 to-cyan-500', borderHeart: 'border-blue-400', tagBg: 'bg-blue-100 text-blue-600' }
            };
            const c = themeColors[userProfile.gender] || themeColors.female;

            // ============== 云端数据同步 ==============
            const [todayStr] = useState(formatYMD(new Date()));
            const [currentMonthView, setCurrentMonthView] = useState(new Date(new Date().getFullYear(), new Date().getMonth(), 1));
            const [selectedDate, setSelectedDate] = useState(todayStr);

            const [messages, setMessages] = useState([]);
            const [plans, setPlans] = useState([]);
            const [anniversaries, setAnniversaries] = useState([]);

            const getCol = (name) => collection(db, 'artifacts', 'private-couple-app', 'public', 'data', `${name}_${roomCode}`);
            
            useEffect(() => {
                if (!user || !isLoggedIn || !roomCode || !db) return;
                
                const unsubMsgs = onSnapshot(getCol('messages'), 
                    (snap) => setMessages(snap.docs.map(d => ({ _docId: d.id, ...d.data() })).sort((a,b) => b.id - a.id)),
                    (error) => showToast(`读取纸条失败: ${error.message}。请检查您的 Firestore 安全规则是否已设为测试模式！`)
                );
                const unsubPlans = onSnapshot(getCol('plans'), 
                    (snap) => setPlans(snap.docs.map(d => ({ _docId: d.id, ...d.data() })).sort((a,b) => b.id - a.id)),
                    (error) => console.error(error)
                );
                const unsubAnniv = onSnapshot(getCol('anniversaries'), 
                    (snap) => setAnniversaries(snap.docs.map(d => ({ _docId: d.id, ...d.data() }))),
                    (error) => console.error(error)
                );
                return () => { unsubMsgs(); unsubPlans(); unsubAnniv(); };
            }, [user, isLoggedIn, roomCode]);

            // ============== 状态处理 ==============
            const [showCalendarModal, setShowCalendarModal] = useState(false);
            const [showAddMenu, setShowAddMenu] = useState(false);
            const [showAddNoteModal, setShowAddNoteModal] = useState(null); 
            const [newNoteText, setNewNoteText] = useState("");
            const [mediaPreview, setMediaPreview] = useState(null);
            const [selectedNote, setSelectedNote] = useState(null);
            const [replyText, setReplyText] = useState("");
            const [isEditingNote, setIsEditingNote] = useState(false);
            const [editNoteText, setEditNoteText] = useState("");

            const [planType, setPlanType] = useState('small');
            const [selectedPlan, setSelectedPlan] = useState(null);
            const [showAddPlanModal, setShowAddPlanModal] = useState(false);
            const [newPlan, setNewPlan] = useState({ text: '', type: 'small', creatorRole: userProfile.gender, deadline: '', details: '' });
            const [isEditingPlan, setIsEditingPlan] = useState(false);
            const [editPlanData, setEditPlanData] = useState(null);

            const [showAddAnniversary, setShowAddAnniversary] = useState(false);
            const [newAnni, setNewAnni] = useState({ title: '', date: '' });
            const [isSaving, setIsSaving] = useState(false);

            useEffect(() => { if (selectedNote) { const updated = messages.find(m => m.id === selectedNote.id); if (updated) setSelectedNote(updated); } }, [messages]);
            useEffect(() => { if (selectedPlan) { const updated = plans.find(p => p.id === selectedPlan.id); if (updated) setSelectedPlan(updated); } }, [plans]);

            const isMe = (role) => role === userProfile.gender;

            // ============== 交互方法 ==============
            const handleLogin = () => {
                setUserProfile(editProfile);
                setIsLoggedIn(true);
                localStorage.setItem('couple_app_logged_in', 'true');
                localStorage.setItem('couple_app_room_code', roomCode);
                localStorage.setItem('couple_app_profile', JSON.stringify(editProfile));
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                localStorage.removeItem('couple_app_logged_in');
                setShowProfileModal(false);
            };

            const handleSaveProfile = () => {
                setUserProfile(editProfile);
                setShowProfileModal(false);
                localStorage.setItem('couple_app_profile', JSON.stringify(editProfile));
            };

            const handleSaveNewNote = async () => {
                if (!newNoteText.trim() && showAddNoteModal === 'text' && !mediaPreview) return;
                
                // 🚨 检查是否未鉴权
                if (!user) {
                    showToast("身份未验证，无法保存！请在 Firebase 后台开启 Authentication -> 匿名登录。");
                    return;
                }

                // 🚨 检查图片大小 (Firebase 单条数据限制 1MB，我们限制为 800KB)
                if (mediaPreview && mediaPreview.length > 800 * 1024) {
                    showToast("⚠️ 上传的图片/视频太大了！请选择较小的文件（800KB 以内）。");
                    return;
                }

                setIsSaving(true);
                try {
                    const now = new Date();
                    const bgColors = ['bg-yellow-100', 'bg-orange-50', 'bg-emerald-50', 'bg-blue-50', 'bg-rose-50'];
                    const newMsg = {
                        id: Date.now(),
                        type: showAddNoteModal,
                        text: newNoteText || (showAddNoteModal === 'photo' ? '分享了一张照片 📷' : '分享了一段视频 🎥'),
                        mediaUrl: mediaPreview || null,
                        date: todayStr,
                        time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                        bg: bgColors[Math.floor(Math.random() * bgColors.length)],
                        rotation: ['rotate-1', 'rotate-2', '-rotate-1', '-rotate-2'][Math.floor(Math.random() * 4)],
                        creatorRole: userProfile.gender,
                        replies: []
                    };
                    await setDoc(doc(getCol('messages'), newMsg.id.toString()), newMsg);
                    setShowAddNoteModal(null); setNewNoteText(""); setMediaPreview(null);
                } catch (err) {
                    showToast(`保存纸条失败: ${err.message}`);
                    console.error("Save error:", err);
                } finally {
                    setIsSaving(false);
                }
            };

            const handleReplyNote = async () => {
                if (!replyText.trim() || !selectedNote) return;
                try {
                    const now = new Date();
                    const newReply = { creatorRole: userProfile.gender, text: replyText, time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
                    await setDoc(doc(getCol('messages'), selectedNote._docId), { replies: [...(selectedNote.replies || []), newReply] }, { merge: true });
                    setReplyText("");
                } catch (err) {
                    showToast(`回复失败: ${err.message}`);
                }
            };
            
            const togglePlanCompletion = async (id) => {
                try {
                    const plan = plans.find(p => p.id === id);
                    if (!plan) return;
                    const isNowCompleted = !plan.completed;
                    await setDoc(doc(getCol('plans'), plan._docId), { completed: isNowCompleted, completedAt: isNowCompleted ? todayStr : null }, { merge: true });
                } catch (err) {
                    showToast(`打卡失败: ${err.message}`);
                }
            };

            const handleSavePlan = async () => {
                if (!newPlan.text.trim()) return;
                setIsSaving(true);
                try {
                    const planToAdd = { ...newPlan, id: Date.now(), completed: false, images: [], createdAt: todayStr, completedAt: null, creatorRole: newPlan.creatorRole };
                    await setDoc(doc(getCol('plans'), planToAdd.id.toString()), planToAdd);
                    setShowAddPlanModal(false);
                    setNewPlan({ text: '', type: 'small', creatorRole: userProfile.gender, deadline: '', details: '' });
                } catch (err) {
                    showToast(`新建计划失败: ${err.message}`);
                } finally {
                    setIsSaving(false);
                }
            };

            const handleAddPlanImage = async () => {
                if (!selectedPlan) return;
                try {
                    const newImages = [...(selectedPlan.images || []), `mock-new-${Date.now()}`];
                    await setDoc(doc(getCol('plans'), selectedPlan._docId), { images: newImages }, { merge: true });
                } catch (err) {
                    showToast(`添加图片失败: ${err.message}`);
                }
            };

            const handleSaveAnniversary = async () => {
                if (!newAnni.title || !newAnni.date) return;
                setIsSaving(true);
                try {
                    const anniData = { id: Date.now(), ...newAnni, type: 'love' };
                    await setDoc(doc(getCol('anniversaries'), anniData.id.toString()), anniData);
                    setShowAddAnniversary(false);
                    setNewAnni({ title: '', date: '' });
                } catch (err) {
                    showToast(`添加纪念日失败: ${err.message}`);
                } finally {
                    setIsSaving(false);
                }
            };

            const calculateDaysLeft = (targetDateStr) => {
                const target = new Date(targetDateStr);
                const today = new Date(todayStr);
                if (target < today) target.setFullYear(today.getFullYear() + 1);
                const diffTime = target - today;
                return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            };

            const getDaysInMonth = (year, month) => {
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const firstDayOfWeek = new Date(year, month, 1).getDay(); 
                const days = [];
                for (let i = 0; i < firstDayOfWeek; i++) days.push(null);
                for (let i = 1; i <= daysInMonth; i++) days.push(new Date(year, month, i));
                return days;
            };

            // ============== 门禁登录页 ==============
            if (!isLoggedIn) {
                return (
                    <div className="min-h-[100dvh] bg-[#FDFCF8] flex items-center justify-center p-4 relative overflow-hidden font-sans">
                        {toastMsg && <div className="absolute top-10 w-[90%] max-w-sm bg-gray-900 text-white p-4 rounded-xl shadow-2xl z-50 text-xs font-bold leading-relaxed">{toastMsg}</div>}
                        <div className="bg-white w-full max-w-[360px] rounded-[32px] shadow-2xl p-8 relative z-10 border border-gray-100">
                            <div className="flex justify-center mb-6"><div className="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center shadow-inner"><Shield size={32} className="text-gray-300" /></div></div>
                            <h1 className="text-2xl font-black text-gray-800 text-center mb-2">小窝门禁</h1>
                            <p className="text-sm text-gray-400 text-center mb-8">云端加密同步，属于两人的私密空间</p>
                            <div className="space-y-6">
                                <div>
                                    <label className="text-xs font-bold text-gray-500 mb-2 flex items-center"><Key size={14} className="mr-1.5"/>专属配对暗号</label>
                                    <input type="text" value={roomCode} onChange={e => setRoomCode(e.target.value)} placeholder="输入约定暗号" className="w-full bg-gray-50 p-4 rounded-2xl text-center font-bold text-lg outline-none" />
                                </div>
                                <div className="bg-gray-50/50 p-4 rounded-2xl border border-gray-100">
                                    <label className="text-xs font-bold text-gray-500 mb-3 flex items-center"><User size={14} className="mr-1.5"/>我的身份</label>
                                    <div className="flex space-x-3 mb-4">
                                        <button onClick={() => setEditProfile({...editProfile, gender: 'female'})} className={`flex-1 py-3 rounded-xl text-sm font-bold border-2 ${editProfile.gender === 'female' ? 'border-rose-400 text-rose-500 bg-rose-50' : 'border-gray-100 text-gray-400 bg-white'}`}>👩 女生</button>
                                        <button onClick={() => setEditProfile({...editProfile, gender: 'male'})} className={`flex-1 py-3 rounded-xl text-sm font-bold border-2 ${editProfile.gender === 'male' ? 'border-blue-400 text-blue-500 bg-blue-50' : 'border-gray-100 text-gray-400 bg-white'}`}>👨 男生</button>
                                    </div>
                                    <input type="text" value={editProfile.nickname} onChange={e => setEditProfile({...editProfile, nickname: e.target.value})} placeholder="我在小窝的昵称" className="w-full p-3 rounded-xl text-sm outline-none border border-gray-100 text-center" />
                                </div>
                                <button disabled={!roomCode.trim() || !editProfile.nickname.trim()} onClick={handleLogin} className="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold flex items-center justify-center disabled:opacity-30"><Lock size={18} className="mr-2" />推门进入</button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ============== 主体页面 ==============
            const dayMessages = messages.filter(m => m.date === selectedDate);
            const todayMessages = messages.filter(m => m.date === todayStr);

            return (
                <div className="min-h-[100dvh] sm:bg-gray-200 flex sm:items-center justify-center sm:p-4 font-sans relative">
                    {/* 全局 Toast 错误提示条 */}
                    {toastMsg && (
                        <div className="fixed top-10 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-4 rounded-xl shadow-2xl z-[999] w-[90%] max-w-sm text-xs font-bold leading-relaxed flex items-start">
                            <span className="mr-3 text-lg">⚠️</span> 
                            <div className="flex-1 pt-0.5">{toastMsg}</div>
                            <button onClick={() => setToastMsg('')} className="ml-3 text-gray-400 hover:text-white"><X size={16}/></button>
                        </div>
                    )}

                    <div className="w-full h-[100dvh] sm:h-[800px] sm:max-w-[390px] bg-white sm:rounded-[40px] shadow-2xl relative overflow-hidden sm:border-8 sm:border-gray-900">
                        <div className="h-full relative overflow-y-auto pb-24 scrollbar-hide">
                            
                            {/* --- 页面 1：小纸条 --- */}
                            {activeTab === 'home' && (
                                <div className="p-5">
                                    <div className="flex justify-between items-center mt-2 mb-6">
                                        <div><h1 className="text-2xl font-bold text-gray-800">小纸条</h1><p className="text-sm text-gray-500 mt-1">Hello {userProfile.nickname}</p></div>
                                        <div onClick={() => setShowProfileModal(true)} className={`w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center ${c.text} cursor-pointer`}><User size={20} /></div>
                                    </div>
                                    <div onClick={() => setShowCalendarModal(true)} className={`bg-gradient-to-r ${c.gradient} rounded-2xl p-5 text-white mb-6 shadow-lg cursor-pointer`}>
                                        <div className="flex items-center space-x-3"><Calendar size={24} /><div className="text-2xl font-black">{todayStr}</div></div>
                                    </div>
                                    <div className="relative min-h-[300px]">
                                        {todayMessages.length === 0 ? (
                                            <div className="flex flex-col items-center justify-center h-48 opacity-50 mt-10">
                                              <div className="w-16 h-16 rounded-full bg-gray-100 flex items-center justify-center mb-4"><MessageSquare size={28} className="text-gray-400" /></div>
                                              <p className="text-sm font-bold text-gray-500">今天的客厅空空如也</p>
                                            </div>
                                        ) : (
                                            <div className="grid grid-cols-2 gap-4 pb-12">
                                                {todayMessages.map((msg) => (
                                                    <div key={msg.id} onClick={() => setSelectedNote(msg)} className={`${msg.bg} p-4 rounded-xl shadow-sm transform ${msg.rotation} border border-black/5 cursor-pointer`}>
                                                        {msg.type === 'photo' && <div className="w-full h-20 bg-black/5 rounded-lg mb-2 overflow-hidden">{msg.mediaUrl ? <img src={msg.mediaUrl} className="w-full h-full object-cover" alt="photo"/> : <ImageIcon size={20} className="m-auto mt-6 text-gray-400"/>}</div>}
                                                        {msg.type === 'video' && <div className="w-full h-20 bg-black/5 rounded-lg mb-2 flex items-center justify-center relative overflow-hidden">{msg.mediaUrl ? <video src={msg.mediaUrl} className="w-full h-full object-cover"/> : <Video size={20} className="text-gray-400"/>}</div>}
                                                        <p className="text-gray-800 text-sm font-medium leading-relaxed line-clamp-3">{msg.text}</p>
                                                        <div className="flex justify-between items-center mt-3">
                                                            <span className="text-[10px] text-gray-500/70 flex items-center">
                                                                {(msg.replies && msg.replies.length > 0) && <span className="flex items-center"><MessageSquare size={10} className="mr-1"/>{msg.replies.length}</span>}
                                                            </span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* --- 页面 2：备忘录 --- */}
                            {activeTab === 'plan' && (
                                <div className="p-5 bg-stone-50 min-h-full">
                                    <h1 className="text-2xl font-bold text-gray-800 mt-2 mb-6">备忘录</h1>
                                    <div className="flex bg-gray-200/60 rounded-xl p-1 mb-6">
                                        <button onClick={() => setPlanType('small')} className={`flex-1 py-2.5 rounded-lg text-sm font-semibold ${planType === 'small' ? 'bg-white shadow-sm' : 'text-gray-500'}`}>小计划</button>

                            <div className="absolute inset-0 z-[80] flex items-center justify-center bg-black/40 p-4">
                                <div className="bg-white w-full rounded-3xl p-5 shadow-2xl">
                                    <div className="flex justify-between items-center mb-4"><h3 className="font-bold text-gray-800">添加纪念日</h3><button onClick={() => setShowAddAnniversary(false)} className="p-1 bg-gray-100 rounded-full"><X size={16}/></button></div>
                                    <div className="space-y-4">
                                        <div><label className="text-xs text-gray-500 mb-1 block">什么日子？</label><input type="text" value={newAnni.title} onChange={e => setNewAnni({...newAnni, title: e.target.value})} className="w-full bg-gray-50 p-3 rounded-xl text-sm outline-none"/></div>
                                        <div><label className="text-xs text-gray-500 mb-1 block">日期</label><input type="date" value={newAnni.date} onChange={e => setNewAnni({...newAnni, date: e.target.value})} className="w-full bg-gray-50 p-3 rounded-xl text-sm outline-none"/></div>
                                        <button onClick={handleSaveAnniversary} disabled={isSaving} className={`w-full py-3 ${c.bg} text-white rounded-xl font-medium text-sm mt-2`}>
                                            {isSaving ? '正在保存...' : '保存'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 个人设置弹窗 */}
                        {showProfileModal && (
                            <div className="absolute inset-0 z-[80] flex items-center justify-center bg-black/40 p-4">
                                <div className="bg-white w-full rounded-3xl p-6 shadow-2xl">
                                    <div className="flex justify-between items-center mb-6"><h3 className="font-bold text-gray-800 flex items-center text-lg"><Settings size={20} className="mr-2 text-gray-600" />账户与偏好</h3><button onClick={() => setShowProfileModal(false)} className="p-1.5 bg-gray-100 rounded-full"><X size={18}/></button></div>
                                    <div className="space-y-5">
                                        <div><label className="text-xs font-semibold text-gray-500 mb-2 block">我的昵称</label><input type="text" value={editProfile.nickname} onChange={e => setEditProfile({...editProfile, nickname: e.target.value})} className="w-full bg-gray-50 p-3 rounded-xl text-sm outline-none"/></div>
                                        <div>
                                            <label className="text-xs font-semibold text-gray-500 mb-2 block">性别 (切换主题色)</label>
                                            <div className="flex space-x-3">
                                                <button onClick={() => setEditProfile({...editProfile, gender: 'male'})} className={`flex-1 py-2.5 rounded-xl text-sm font-medium border-2 ${editProfile.gender === 'male' ? 'border-blue-500 text-blue-500 bg-blue-50' : 'border-gray-100 text-gray-400 bg-white'}`}>男生</button>
                                                <button onClick={() => setEditProfile({...editProfile, gender: 'female'})} className={`flex-1 py-2.5 rounded-xl text-sm font-medium border-2 ${editProfile.gender === 'female' ? 'border-rose-500 text-rose-500 bg-rose-50' : 'border-gray-100 text-gray-400 bg-white'}`}>女生</button>
                                            </div>
                                        </div>
                                        <div className="pt-2 space-y-3">
                                            <button onClick={handleSaveProfile} className={`w-full py-3.5 ${editProfile.gender === 'male' ? 'bg-blue-500' : 'bg-rose-500'} text-white rounded-xl font-medium text-sm shadow-md`}>保存设置</button>
                                            <button onClick={handleLogout} className="w-full py-3.5 bg-gray-100 text-gray-500 hover:bg-gray-200 rounded-xl font-medium text-sm">退出当前小窝</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
